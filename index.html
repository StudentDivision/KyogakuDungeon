/* =========================================================
  レトロRPG風 教学クイズバトルゲーム
  見た目強化版
  HTML / CSS / JavaScript 1ファイル完結
========================================================= */

:root {
  --blue: #061a9b;
  --blue2: #020a4f;
  --deep: #01031f;
  --white: #ffffff;
  --yellow: #ffe66d;
  --gold: #ffd15c;
  --cyan: #8be9ff;
  --red: #ff6464;
  --green: #78ff9a;
  --purple: #b18cff;
  --black: #050505;
  --shadow: rgba(0,0,0,.45);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  background: #000;
  color: var(--white);
  font-family: system-ui, "Hiragino Sans", "Yu Gothic", "Meiryo", monospace;
  overflow-x: hidden;
  user-select: none;
  touch-action: manipulation;
}

body {
  display: flex;
  justify-content: center;
}

/* =========================================================
  背景：教育・学び・希望を感じる清潔な青空
========================================================= */

  #app {
  width: 100%;
  max-width: 480px;
  min-height: 100svh;
  padding: 6px;
  padding-bottom: calc(96px + var(--safe-bottom));
  display: flex;
  flex-direction: column;
  gap: 5px;
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

/* =========================================================
  修正版：文章を隠さず、スマホでも収まりやすくする
========================================================= */

/* 画面全体は、切り捨てず必要時だけスクロール可能にする */
#app {
  height: auto;
  min-height: 100svh;
  padding: 6px;
  padding-bottom: calc(96px + var(--safe-bottom));
  gap: 5px;
  overflow-x: hidden;
  overflow-y: auto;
}

/* 上部・ステータスは少しだけ圧縮 */
#topBar {
  padding: 6px 8px;
  font-size: 13px;
}

#status {
  padding: 6px 8px;
  font-size: 11.5px;
  gap: 3px 8px;
}

.barOuter {
  height: 8px;
}

/* 敵エリアを少しだけ低くする */
#enemyArea {
  flex: 0 0 auto;
  min-height: 0;
  height: 205px;
  padding: 7px;
  gap: 4px;
}

.enemyName {
  font-size: 16px;
  line-height: 1.1;
}

.enemyStage {
  height: 98px;
}

#enemyImage {
  max-width: 112px;
  max-height: 92px;
}

.monster {
  width: 96px;
  height: 86px;
}

.enemyMeta {
  font-size: 11px;
  line-height: 1.1;
}

/* ここが重要：メッセージを隠さない */
#messageBox {
  height: auto;
  min-height: 82px;
  max-height: 116px;
  padding: 9px 10px;
  font-size: 13px;
  line-height: 1.35;
  overflow-y: auto;
  overflow-x: hidden;
}

/* クイズ欄も少し圧縮 */
#quizBox {
  padding: 7px;
  gap: 5px;
}

#category {
  font-size: 11px;
  line-height: 1.1;
}

#question {
  font-size: 13px;
  line-height: 1.28;
}

#timerOuter {
  height: 8px;
}

#choices {
  gap: 5px;
}

.choiceBtn {

  padding: 6px 9px;
  font-size: 12.5px;

/* 高さがかなり狭いブラウザ用 */
@media (max-height: 760px) {
  #enemyArea {

  }

    height: 86px;
  }

    max-width: 96px;

  }

  .monster {
    width: 86px;

    min-height: 78px;

    line-height: 1.32;

  }
}

/* 光の粒と、朝の教室に差し込むような斜め光 */
#app::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 16% 14%, rgba(255,255,255,.95) 0 2px, transparent 3px),
    radial-gradient(circle at 74% 13%, rgba(255,255,255,.78) 0 1px, transparent 3px),
    radial-gradient(circle at 38% 31%, rgba(255,255,255,.68) 0 1px, transparent 3px),
    radial-gradient(circle at 86% 44%, rgba(255,255,255,.68) 0 2px, transparent 4px),
    linear-gradient(120deg, rgba(255,255,255,.22), transparent 36%, rgba(255,255,255,.13), transparent 72%);
  opacity: .62;
  pointer-events: none;
}

/* 下部の白い雲。UIの邪魔をしないよう淡く配置 */
#app::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -20px;
  width: 570px;
  height: 185px;
  transform: translateX(-50%);

    radial-gradient(ellipse at 14% 72%, rgba(255,255,255,.94) 0 18%, transparent 19%),
    radial-gradient(ellipse at 31% 63%, rgba(255,255,255,.92) 0 22%, transparent 23%),
    radial-gradient(ellipse at 51% 73%, rgba(255,255,255,.96) 0 25%, transparent 26%),
    radial-gradient(ellipse at 71% 62%, rgba(255,255,255,.91) 0 21%, transparent 22%),
    radial-gradient(ellipse at 88% 73%, rgba(255,255,255,.93) 0 18%, transparent 19%),
    linear-gradient(180deg, transparent 0%, rgba(255,255,255,.40) 64%, rgba(255,255,255,.78) 100%);
  opacity: .72;
  pointer-events: none;
}

.window {

  z-index: 1;

    linear-gradient(180deg, rgba(23,91,205,.94), rgba(10,49,154,.94));

.hidden {

}

.titleMain {
  text-align: center;

.titleLogoMark {

.enemyName {

}

.enemyMeta {
  font-size: 12px;
}

.enemyStage {
  position: relative;

.enemyStage::before {

  position: absolute;

#enemyImage {
  position: relative;

.monster {
  position: relative;

  height: 116px;

    drop-shadow(0 10px 0 rgba(0,0,0,.35))

  animation: floaty 1.8s infinite ease-in-out;
}

.monster.seed {
  background: #63dd7a;
  border: 4px solid #fff;
  border-radius: 55% 55% 45% 45%;
  clip-path: polygon(50% 0, 85% 28%, 96% 65%, 75% 100%, 25% 100%, 4% 65%, 15% 28%);
}

.monster.bat {
  background: #4d45c8;
  border: 4px solid #fff;
  border-radius: 50%;
}

.monster.bat::before,
.monster.bat::after {
  content: "";
  position: absolute;
  top: 28px;
  width: 68px;
  height: 42px;
  background: #282080;
  border: 3px solid #fff;
  z-index: -1;
}

.monster.bat::before {
  left: -52px;
  transform: rotate(-22deg);
  border-radius: 80% 20% 80% 20%;
}

.monster.bat::after {
  right: -52px;
  transform: rotate(22deg);
  border-radius: 20% 80% 20% 80%;
}

.monster.cloud {
  background: #cbcfff;
  border: 4px solid #fff;
  border-radius: 48% 48% 36% 36%;
}

.monster.cloud::before,
.monster.cloud::after {
  content: "";
  position: absolute;
  bottom: -8px;
  width: 48px;
  height: 36px;
  background: #cbcfff;
  border: 3px solid #fff;
  border-top: 0;
  border-radius: 0 0 50% 50%;
}

.monster.cloud::before { left: 10px; }
.monster.cloud::after { right: 10px; }

.monster.owl {
  background: #d0954f;
  border: 4px solid #fff;
  border-radius: 48% 48% 42% 42%;
}

.monster.owl::before,
.monster.owl::after {
  content: "";
  position: absolute;
  top: -12px;
  width: 34px;
  height: 34px;
  background: #d0954f;
  border: 3px solid #fff;
  clip-path: polygon(50% 0, 100% 100%, 0 100%);
}

.monster.owl::before { left: 12px; }
.monster.owl::after { right: 12px; }

.monster.wall {
  background:
    linear-gradient(90deg, rgba(255,255,255,.25) 1px, transparent 1px),

.monster.boss {

.monster.boss::before,

/* =========================================================
  画面演出
========================================================= */

#flashLayer {
  position: absolute;
  inset: 0;
  z-index: 40;
  display: grid;
  place-items: center;
  pointer-events: none;
  opacity: 0;
}

.flashText {
  font-size: clamp(34px, 11vw, 54px);
  font-weight: 900;
  color: var(--yellow);
  letter-spacing: 4px;
  text-shadow:
    0 0 14px rgba(255,255,255,.95),
    3px 3px 0 #000;
}

#flashLayer.showCorrect {
  animation: flashPop .7s ease-out both;
}

#flashLayer.showWrong {
  animation: wrongFlash .55s ease-out both;
}

#flashLayer.showLevel {
  animation: levelFlash .95s ease-out both;
}

#flashLayer.showDefeat {
  animation: defeatFlash .75s ease-out both;
}

.screenShake {
  animation: screenShake .32s ease-out;
}

.damage {
  animation: damage .34s;
}

.appear {
  animation: appear .32s both, floaty 1.8s infinite ease-in-out .32s;
}

.defeatAnim {
  animation: enemyDefeat .55s ease-in both;
}

/* =========================================================
  アニメーション
========================================================= */

@keyframes titlePulse {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 0 18px rgba(255,255,255,.4);
  }
  50% {
    transform: scale(1.06);
    box-shadow: 0 0 30px rgba(255,230,109,.65);
  }
}

@keyframes floaty {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-7px); }
}

@keyframes blink {
  0%,49% { opacity: 1; }
  50%,100% { opacity: 0; }
}

@keyframes damage {
  0%,100% { transform: translateX(0); filter: brightness(1); }
  20% { transform: translateX(-8px); filter: brightness(2); }
  40% { transform: translateX(8px); filter: brightness(.6); }
  60% { transform: translateX(-5px); filter: brightness(1.8); }
  80% { transform: translateX(5px); filter: brightness(.8); }
}

@keyframes appear {
  0% { transform: scale(.75) translateY(-12px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

@keyframes flashPop {
  0% { opacity: 0; transform: scale(.75); background: rgba(255,255,255,0); }
  20% { opacity: 1; transform: scale(1.12); background: rgba(255,255,255,.22); }
  55% { opacity: 1; transform: scale(1); background: rgba(255,230,109,.08); }
  100% { opacity: 0; transform: scale(1.05); background: rgba(255,255,255,0); }
}

@keyframes wrongFlash {
  0% { opacity: 0; background: rgba(255,0,0,0); }
  25% { opacity: 1; background: rgba(255,0,0,.18); }
  100% { opacity: 0; background: rgba(0,0,0,0); }
}

@keyframes levelFlash {
  0% { opacity: 0; transform: scale(.8); background: rgba(255,255,255,0); }
  20% { opacity: 1; transform: scale(1.12); background: rgba(139,233,255,.20); }
  55% { opacity: 1; transform: scale(1); background: rgba(255,230,109,.18); }
  100% { opacity: 0; transform: scale(1.08); background: rgba(255,255,255,0); }
}

@keyframes defeatFlash {
  0% { opacity: 0; background: rgba(255,255,255,0); }
  20% { opacity: 1; background: rgba(255,255,255,.30); }
  100% { opacity: 0; background: rgba(255,255,255,0); }
}

@keyframes enemyDefeat {
  0% { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1); }

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function nowText() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  return `${y}-${m}-${day} ${h}:${min}`;
}

/* =========================================================
  WebAudio API
========================================================= */

let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function tone(freq, duration = .08, type = "square", volume = .06) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfx(type) {
  if (!audioCtx) return;

  if (type === "select") {
    tone(740, .05);
    setTimeout(() => tone(980, .05), 45);
  }

  if (type === "correct") {
    tone(660, .08);
    setTimeout(() => tone(880, .08), 80);
    setTimeout(() => tone(1320, .12), 160);
  }

  if (type === "wrong") {
    tone(220, .12, "square", .08);
    setTimeout(() => tone(160, .14, "square", .08), 110);
  }

  if (type === "damage") {
    tone(140, .12, "sawtooth", .09);
    setTimeout(() => tone(90, .12, "sawtooth", .08), 90);
  }

  if (type === "win") {
    [523, 659, 784, 1046].forEach((n, i) => {
      setTimeout(() => tone(n, .1), i * 100);
    });
  }

  if (type === "level") {
    [523, 587, 659, 784, 1046].forEach((n, i) => {
      setTimeout(() => tone(n, .08), i * 80);
    });
  }

  if (type === "gameover") {
    [330, 294, 262, 196].forEach((n, i) => {
      setTimeout(() => tone(n, .18, "triangle", .08), i * 160);
    });
  }
}

/* =========================================================
  メッセージ表示処理
========================================================= */

let messageResolve = null;
let fullMessageText = "";
let typing = false;
let skipTyping = false;

function showMessage(text) {
  return new Promise(async (resolve) => {
    messageResolve = resolve;
    fullMessageText = text;
    typing = true;
    skipTyping = false;
    message.textContent = "";
    nextMark.classList.add("hidden");

    for (let i = 0; i < text.length; i++) {
      if (skipTyping) break;
      message.textContent += text[i];

      if (text[i] !== "\n" && i % 2 === 0) {
        tone(1050, .012, "square", .012);
      }

      await wait(24);
    }

    message.textContent = text;
    typing = false;
    nextMark.classList.remove("hidden");
  });
}

messageBox.addEventListener("click", () => {
  if (!messageResolve) return;

  if (typing) {
    skipTyping = true;
    message.textContent = fullMessageText;
    typing = false;
    nextMark.classList.remove("hidden");
    return;
  }

  const resolve = messageResolve;
  messageResolve = null;
  nextMark.classList.add("hidden");
  resolve();
});

function saveGame() {
  localStorage.setItem(SAVE_KEY, JSON.stringify(player));
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;

  try {
    player = JSON.parse(raw);
    resetDecks();
    return true;
  } catch {
    return false;
  }
}

function deleteSave() {
  localStorage.removeItem(SAVE_KEY);
}

function getHighScore() {
  return Number(localStorage.getItem(HIGH_SCORE_KEY) || "0");
}

function setHighScore(score) {
  localStorage.setItem(HIGH_SCORE_KEY, String(score));
}

function getHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  } catch {
    return [];
  }
}

function saveHistory() {
  const accuracy = player.totalAnswered
    ? Math.round(player.correctCount / player.totalAnswered * 100)
    : 0;

  const record = {
    date: nowText(),
    score: player.score,
    level: player.level,
    defeated: player.defeatedCount,
    correct: player.correctCount,
    total: player.totalAnswered,
    accuracy,
    bestCombo: player.bestCombo
  };

  const history = [record, ...getHistory()].slice(0, 5);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));

  if (player.score > getHighScore()) {
    setHighScore(player.score);
    return true;
  }

  return false;
}

/* =========================================================
  敵生成・ボス生成処理
========================================================= */

function createEnemy() {
  const nextCount = player.defeatedCount + 1;
  const isBoss = nextCount % 10 === 0;

  if (isBoss) {
    const bossIndex = Math.min(player.floor - 1, bossNames.length - 1);
    const baseHp = 70 + player.floor * 20 + player.defeatedCount * 3;
    const baseAtk = 8 + player.floor * 3;

    return {
      name: bossNames[bossIndex],
      type: "boss",
      image: bossImages[bossIndex] || "",
      hp: baseHp,
      maxHp: baseHp,
      attack: baseAtk,
      exp: 35 + player.floor * 8,
      score: 700 + player.floor * 120,
      boss: true
    };
  }

  const template = enemyTemplates[rand(0, enemyTemplates.length - 1)];
  const hp = template.baseHp + player.floor * 5 + player.defeatedCount;
  const atk = template.baseAtk + player.floor * 2 + Math.floor(player.defeatedCount / 10);

  return {
    name: template.name,
    type: template.type,
    image: template.image || "",
    hp,
    maxHp: hp,
    attack: atk,
    exp: template.exp + player.floor * 2,
    score: template.score + player.floor * 20,
    boss: false
  };
}

async function spawnEnemy() {
  currentEnemy = createEnemy();
  renderEnemyVisual(currentEnemy);

  updateUI();

  if (currentEnemy.boss) {
    playFlash("BOSS", "showLevel");
    await showMessage(`空気が ふるえている……\n${currentEnemy.name}が あらわれた！`);
  } else {
    await showMessage(`${currentEnemy.name}が あらわれた！`);
  }

  startQuestion();
}

/* =========================================================
  クイズ出題処理
========================================================= */

function getNextQuiz() {
  const nextNumber = player.totalAnswered + 1;
  const isChallenge = nextNumber % 10 === 0;

  if (isChallenge) {
    if (challengeDeck.length === 0) {
      challengeDeck = shuffle(challengeQuizBank.map((_, i) => i));
    }
    const index = challengeDeck.pop();
    return {
      ...challengeQuizBank[index],
      challenge: true
    };
  }

  if (questionDeck.length === 0) {
    questionDeck = shuffle(quizBank.map((_, i) => i));
  }

  const index = questionDeck.pop();
  return {
    ...quizBank[index],
    challenge: false
  };
}

function prepareQuiz(quiz) {
  const correctText = quiz.choices[quiz.answer];
  const mixed = shuffle(quiz.choices);

  return {
    ...quiz,
    choices: mixed,
    answer: mixed.indexOf(correctText)
  };
}

function startQuestion() {
  currentQuiz = prepareQuiz(getNextQuiz());
  isAnswering = true;

  quizBox.classList.remove("hidden");
  categoryEl.textContent = currentQuiz.challenge
    ? `★ ${currentQuiz.category}`
    : currentQuiz.category;

  questionEl.textContent = currentQuiz.question;
  choicesEl.innerHTML = "";

  currentQuiz.choices.forEach((choice, index) => {
    const btn = document.createElement("button");
    btn.className = "choiceBtn";
    btn.textContent = `${index + 1}. ${choice}`;
    btn.addEventListener("click", () => answerQuestion(index));
    choicesEl.appendChild(btn);
  });

  setQuizEnabled(true);
  startTimer(currentQuiz.challenge ? 18 : 13);
}

function startTimer(seconds) {
  clearInterval(quizTimer);
  timeLeft = seconds;
  timerBar.style.width = "100%";
  timerBar.style.background = "linear-gradient(90deg, #ffe66d, #ffffff)";

  quizTimer = setInterval(() => {
    timeLeft -= 0.1;
    const rate = Math.max(0, timeLeft / seconds);
    timerBar.style.width = `${rate * 100}%`;

    if (rate < 0.3) {
      timerBar.style.background = "linear-gradient(90deg, #ff6464, #ffe66d)";
    }

    if (timeLeft <= 0) {
      clearInterval(quizTimer);
      answerQuestion(-1);
    }
  }, 100);
}

/* =========================================================
  バトル処理
========================================================= */

async function answerQuestion(index) {
  if (!isAnswering) return;

  isAnswering = false;
  clearInterval(quizTimer);
  setQuizEnabled(false);
  sfx("select");

  const correct = index === currentQuiz.answer;
  player.totalAnswered++;

  if (correct) {
    await handleCorrect();
  } else {
    await handleWrong(index);
  }

  updateUI();
  saveGame();
}

async function handleCorrect() {
  sfx("correct");
  playFlash("正解！", "showCorrect");

  player.correctCount++;
  player.combo++;
  player.bestCombo = Math.max(player.bestCombo, player.combo);

  const expGain = currentQuiz.challenge ? 12 : 4;
  player.exp += expGain;

  const baseDamage = player.quizPower + player.attack + rand(4, 9);
  const comboBonus = Math.min(30, player.combo * 2);
  const challengeBonus = currentQuiz.challenge ? 12 : 0;
  const damage = baseDamage + comboBonus + challengeBonus;

  player.score += currentQuiz.challenge ? 300 : 100;
  player.score += player.combo * 10;

  await showMessage(`正解！\n${currentQuiz.explanation}`);
  await checkLevelUp();

  currentEnemy.hp -= damage;
  animateEnemyDamage();

  sfx("damage");
  updateUI();

  await showMessage(`${currentEnemy.name}に\n${damage}の ダメージ！`);

  if (currentEnemy.hp <= 0) {
    await defeatEnemy();
  } else {
    startQuestion();
  }
}

async function handleWrong(index) {
  sfx("wrong");
  playFlash("不正解", "showWrong");
  screenShake();

  player.wrongCount++;
  player.combo = 0;

  const correctText = currentQuiz.choices[currentQuiz.answer];

  if (index === -1) {
    await showMessage(`時間切れ！\n正解は「${correctText}」。\n${currentQuiz.explanation}`);
  } else {
    await showMessage(`ざんねん！\n正解は「${correctText}」。\n${currentQuiz.explanation}`);
  }

  await enemyAttack();
}

async function enemyAttack() {
  const rawDamage = currentEnemy.attack + rand(-1, 3);
  const damage = Math.max(1, rawDamage - player.defense);

  player.hp -= damage;
  if (player.hp < 0) player.hp = 0;

  sfx("damage");
  screenShake();
  updateUI();

  await showMessage(`${currentEnemy.name}の こうげき！\n${damage}の ダメージを 受けた！`);

  if (player.hp <= 0) {
    await gameOver();
  } else {
    startQuestion();
  }
}

async function defeatEnemy() {
  sfx("win");

  player.defeatedCount++;
  player.exp += currentEnemy.exp;
  player.score += currentEnemy.score;

  await animateEnemyDefeat();

  await showMessage(`${currentEnemy.name}を たおした！\n${currentEnemy.exp}EXPと ${currentEnemy.score}点を 手に入れた！`);

  await checkLevelUp();
  await handleDrop(currentEnemy.boss);

  if (currentEnemy.boss) {
    player.floor++;
    updateFloorBackground();
    await showMessage(`フロアボスを たおした！\n第${player.floor}層へ すすみます。`);
  }

  updateUI();
  saveGame();
  await spawnEnemy();
}

/* =========================================================
  ドロップ処理
========================================================= */

async function handleDrop(isBoss) {
  const roll = Math.random();

  const herbRate = isBoss ? 0.38 : 0.25;
  const swordRate = isBoss ? 0.12 : 0.05;

  if (roll < swordRate) {
    player.attack += 1;
    player.quizPower += 1;
    sfx("level");
    playFlash("武器入手！", "showLevel");
    await showMessage(`学びの剣を 手に入れた！\n攻撃力とクイズ力が 1 あがった！`);
    return;
  }

  if (roll < swordRate + herbRate) {
    const heal = rand(12, 24) + player.floor * 2;
    const before = player.hp;
    player.hp = Math.min(player.maxHp, player.hp + heal);
    const actual = player.hp - before;

    playFlash("回復！", "showCorrect");
    await showMessage(`やくそうを 見つけた！\nHPが ${actual} 回復した！`);
    return;
  }
}

/* =========================================================
  レベルアップ処理
========================================================= */

async function checkLevelUp() {
  while (player.exp >= player.nextExp) {
    player.exp -= player.nextExp;
    player.level++;

    const hpUp = rand(4, 8);
    player.maxHp += hpUp;
    player.attack += 1;
    player.defense += player.level % 2 === 0 ? 1 : 0;
    player.quizPower += 2;
    player.nextExp = Math.floor(player.nextExp * 1.35 + 10);
    player.hp = player.maxHp;

    updateUI();
    sfx("level");
    playFlash("LEVEL UP!", "showLevel");

    await showMessage(`レベルが あがった！\nLv ${player.level}になった！\n最大HPが ${hpUp} あがった！`);
  }
}

/* =========================================================
  スコア保存・ゲームオーバー
========================================================= */

function getEvaluation(accuracy) {
  if (accuracy >= 90) return "すごい！教学マスター級のひらめきです！";
  if (accuracy >= 70) return "かなりいい感じ！学びの力が光っています！";
  if (accuracy >= 50) return "ここからさらに伸びます！もう一度挑戦してみましょう！";
  return "大丈夫。遊びながら少しずつ覚えていきましょう！";
}

async function gameOver() {
  sfx("gameover");
  quizBox.classList.add("hidden");

  const accuracy = player.totalAnswered
    ? Math.round(player.correctCount / player.totalAnswered * 100)
    : 0;

  player.score += player.level * 200;
  player.score += player.bestCombo * 50;
  player.score += Math.max(0, player.hp) * 5;

  const highUpdated = saveHistory();
  deleteSave();

  resultTitle.textContent = "GAME OVER";
  resultBody.innerHTML = `
    ${highUpdated ? '<span class="gold">ハイスコア更新！</span><br>' : ''}
    今回のスコア：<span class="gold">${player.score}</span><br>
    最高スコア：${getHighScore()}<br>
    到達レベル：${player.level}<br>
    撃破数：${player.defeatedCount}<br>
    正解数：${player.correctCount}/${player.totalAnswered}<br>
    正答率：${accuracy}%<br>
    最高コンボ：${player.bestCombo}<br><br>
    ${getEvaluation(accuracy)}
  `;

  historyList.classList.add("hidden");
  closeOverlayBtn.textContent = "タイトルへ";
  resultOverlay.classList.remove("hidden");
}

function showHistory() {
  initAudio();
  sfx("select");

  const history = getHistory();

  resultTitle.textContent = "スコア履歴";
  resultBody.innerHTML = history.length
    ? "過去5回分の記録です。"
    : "まだ記録がありません。";

  historyList.classList.remove("hidden");
  historyList.innerHTML = history.length
    ? history.map((h, i) => `
      <div class="window" style="margin-bottom:8px;">
        ${i + 1}. ${h.date}<br>
        スコア：<span class="gold">${h.score}</span><br>
        Lv：${h.level} / 撃破：${h.defeated}<br>
        正答率：${h.accuracy}% / 最高コンボ：${h.bestCombo}
      </div>
    `).join("")
    : "";

  closeOverlayBtn.textContent = "閉じる";
  resultOverlay.classList.remove("hidden");
}

/* =========================================================
  ゲーム開始
========================================================= */

async function startNewGame() {
  initAudio();
  sfx("select");

  player = createNewPlayer();
  resetDecks();

  titleScreen.classList.add("hidden");
  resultOverlay.classList.add("hidden");
  quizBox.classList.add("hidden");

  updateUI();

  await showMessage("希望の勇者よ、出発です。\n教学クイズで 迷いを照らしましょう！");
  await spawnEnemy();
}

async function continueGame() {
  initAudio();
  sfx("select");

  if (!loadGame()) {
    alert("セーブデータがありません。");
    return;
  }

  titleScreen.classList.add("hidden");
  resultOverlay.classList.add("hidden");
  quizBox.classList.add("hidden");

  updateUI();

  await showMessage("冒険を 再開します。");
  await spawnEnemy();
}

/* =========================================================
  イベント登録
========================================================= */

startBtn.addEventListener("click", startNewGame);
continueBtn.addEventListener("click", continueGame);
historyBtn.addEventListener("click", showHistory);

deleteBtn.addEventListener("click", () => {
  initAudio();
  sfx("select");

  const ok = confirm("セーブデータを削除しますか？\nスコア履歴は残ります。");
  if (ok) {
    deleteSave();
    updateUI();
    alert("セーブデータを削除しました。");
  }
});

closeOverlayBtn.addEventListener("click", () => {
  resultOverlay.classList.add("hidden");
  historyList.classList.add("hidden");
  titleScreen.classList.remove("hidden");
  updateUI();
});

  backTitleBtn.addEventListener("click", () => {
  initAudio();
  sfx("select");

  const ok = confirm("現在の進行をセーブして、タイトルへ戻りますか？");

  if (!ok) return;

  clearInterval(quizTimer);
  isAnswering = false;
  saveGame();

  location.reload();
});

/* =========================================================
  起動処理
========================================================= */

function boot() {
  player = createNewPlayer();
  resetDecks();
  updateUI();

  const high = getHighScore();
  if (high > 0) {
    scoreText.textContent = `最高 ${high}点`;
  }
}

boot();
</script>
